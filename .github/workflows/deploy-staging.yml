name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 192.168.1.233 >> ~/.ssh/known_hosts || true

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Execute Deploy via Direct Tunnel
        env:
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          # Usamos cloudflared access ssh con los headers de Service Token de forma explícita
          ssh -o StrictHostKeyChecking=no \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --service-token-id $CF_ID --service-token-secret $CF_SECRET" \
              "$SSH_USER@$SSH_HOST" <<'REMOTESSH'
            mkdir -p ~/galantesjewelry_staging
            cd ~/galantesjewelry_staging
            if [ ! -d .git ]; then git clone -b develop https://github.com/JoelStalin/Galantesjewerly.git .; fi
            git fetch origin develop
            git reset --hard origin/develop
            
            # Sincronizar secretos
            {
              echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
              echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_USER=odoo"
              echo "ODOO_DB=galantes_db"
              echo "ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}"
              echo "ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}"
              echo "CF_TUNNEL_TOKEN_PROD=${{ secrets.CF_TUNNEL_TOKEN_PROD }}"
              echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
              echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            } > .env.prod
            
            sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build
            sudo docker image prune -f
            echo "Despliegue finalizado exitosamente."
          REMOTESSH
