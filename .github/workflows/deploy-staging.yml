name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Execute Deploy via TCP Proxy
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Iniciamos el proxy TCP local para saltar Access con el Service Token
          echo "Iniciando proxy TCP local..."
          cloudflared access tcp --hostname $SSH_HOST --url localhost:2222 --service-token-id $CF_ID --service-token-secret $CF_SECRET &
          sleep 5
          
          echo "Conectando al servidor staging via proxy local..."
          # Conectamos a localhost:2222 que cloudflared está redirigiendo al túnel
          ssh -v -o StrictHostKeyChecking=no -p 2222 "$SSH_USER@localhost" <<'REMOTESSH'
            set -e
            echo "CONEXION_ESTABLECIDA"
            mkdir -p ~/galantesjewelry_staging
            cd ~/galantesjewelry_staging
            
            if [ ! -d .git ]; then 
              git clone -b develop https://github.com/JoelStalin/Galantesjewerly.git .
            fi
            
            git fetch origin develop
            git reset --hard origin/develop
            
            # Sincronizar secretos
            cat <<EOF > .env.prod
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_USER=odoo
            ODOO_DB=galantes_db
            ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}
            ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            EOF
            
            sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build
            echo "Despliegue finalizado con éxito."
          REMOTESSH
          
          # Matamos el proxy local al terminar
          kill %1 || true
