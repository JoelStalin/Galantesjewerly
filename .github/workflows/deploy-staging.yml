name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH and Deploy
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Intentamos la conexión usando el comando cloudflared access tcp 
          # que a veces es más fiable que 'access ssh' para runners
          echo "Iniciando despliegue robusto (v5)..."
          
          # Usamos ProxyCommand con el path absoluto y los tokens inyectados
          ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              -o "ProxyCommand=/usr/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ID --service-token-secret $CF_SECRET" \
              "$SSH_USER@$SSH_HOST" <<'REMOTESSH'
            set -e
            mkdir -p ~/galantesjewelry_staging
            cd ~/galantesjewelry_staging
            
            if [ ! -d .git ]; then 
              git clone -b develop https://github.com/JoelStalin/Galantesjewerly.git .
            fi
            
            git fetch origin develop
            git reset --hard origin/develop
            
            # Sincronizar secretos
            cat <<EOF > .env.prod
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_USER=odoo
            ODOO_DB=galantes_db
            ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}
            ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            EOF
            chmod 600 .env.prod

            sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build
            sudo docker image prune -f
            echo "Despliegue Staging completado exitosamente."
          REMOTESSH
