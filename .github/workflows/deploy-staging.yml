name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: SSH and Deploy to Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          # Comando mágico para pasar por el túnel de Cloudflare
          proxy_command: cloudflared access ssh --hostname ${{ secrets.STAGING_SSH_HOST }}
          script: |
            # Ir al directorio raíz
            mkdir -p ~/galantesjewelry_staging
            cd ~/galantesjewelry_staging || exit 1

            # Inicializar repo si no existe
            if [ ! -d ".git" ]; then
              git clone -b develop https://github.com/JoelStalin/Galantesjewerly.git .
            fi

            # Sincronizar código
            echo "Sincronizando cambios de Git (Staging)..."
            git fetch origin develop
            CHANGES=$(git diff --name-only HEAD origin/develop)
            git reset --hard origin/develop

            # Sincronizar secretos (PARIDAD TOTAL CON PROD)
            {
              echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
              echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_USER=odoo"
              echo "ODOO_DB=galantes_db"
              echo "ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}"
              echo "ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}"
              echo "CF_TUNNEL_TOKEN_PROD=${{ secrets.CF_TUNNEL_TOKEN_PROD }}"
              echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
              echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            } > .env.prod
            chmod 600 .env.prod

            # Solo reconstruir si hay cambios en el código de la app o dependencias
            if [ ! -f "docker-compose.staging.yml" ] || echo "$CHANGES" | grep -qE "(app/|components/|lib/|src/|package.json|Dockerfile|docker-compose)"; then
              echo "Cambios detectados. Reconstruyendo contenedores de Staging..."
              sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml build web
              sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --no-deps web
            else
              echo "Sin cambios críticos en la app."
            fi

            # Solo actualizar Odoo si hay cambios
            if echo "$CHANGES" | grep -qE "(odoo/|docker-compose)"; then
              echo "Cambios en Odoo detectados..."
              sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --force-recreate odoo
            fi

            # Limpieza suave
            sudo docker image prune -f
            echo "Despliegue de Staging finalizado (Paridad con Prod)."
