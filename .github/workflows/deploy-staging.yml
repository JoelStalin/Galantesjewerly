name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Execute Staging Deploy
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configuración definitiva validada por documentación oficial
          cat <<EOF > ~/.ssh/config
          Host staging
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand /usr/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ID --service-token-secret $CF_SECRET
            StrictHostKeyChecking no
            ConnectTimeout 60
          EOF

          echo "Iniciando despliegue (Non-interactive mode)..."
          ssh -T staging <<'REMOTESSH'
            set -e
            cd ~/galantesjewelry_staging
            git fetch origin develop
            git reset --hard origin/develop
            
            # Sincronizar .env.prod
            cat <<EOF > .env.prod
            NODE_ENV=production
            PORT=3000
            HOSTNAME=0.0.0.0
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_USER=odoo
            ODOO_DB=galantes_db
            ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}
            ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}
            ODOO_BASE_URL=http://odoo:8069
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            EOF
            chmod 600 .env.prod

            docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build
            echo "STAGING_READY"
          REMOTESSH
