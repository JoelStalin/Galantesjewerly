name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Ephemeral Tunnel
        env:
          TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN_STAGING }}
        run: |
          # Iniciamos el tunel en segundo plano para conectar GitHub con el servidor
          # NOTA: Esto asume que el secreto CF_TUNNEL_TOKEN_STAGING existe en GitHub
          cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" & 
          sleep 10

      - name: Execute Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Conectamos directamente a localhost a través del túnel levantado arriba
          # O usamos el hostname stg.getupsoft.com.do si cloudflared access ya está autorizado vía Service Token
          ssh -o StrictHostKeyChecking=no \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
              "$SSH_USER@stg.getupsoft.com.do" "mkdir -p ~/galantesjewelry_staging && cd ~/galantesjewelry_staging && if [ ! -d .git ]; then git clone -b develop https://github.com/JoelStalin/Galantesjewerly.git .; fi && git fetch origin develop && git reset --hard origin/develop && echo 'ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}' > .env.prod && sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build && echo 'Despliegue exitoso.'"
