name: Deploy to Staging (Getupsoft)

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflare Tunnel Client
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Debug Tunnel Connection
        env:
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          echo "Verificando acceso al túnel..."
          # Este comando debería devolver información si el token es válido y la política existe
          cloudflared access curl --service-token-id $CF_ID --service-token-secret $CF_SECRET https://$SSH_HOST || echo "Fallo en verificación de política"

      - name: Setup SSH and Deploy
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CF_AUD: "9a40cc50983b5167e76468120741abe12a59b7ac0b4e1c4db5f2df6de8ff4c87"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Usamos PreferredAuthentications para forzar la llave
          ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              -o PreferredAuthentications=publickey \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --service-token-id $CF_ID --service-token-secret $CF_SECRET --aud $CF_AUD" \
              "$SSH_USER@$SSH_HOST" <<'REMOTESSH'
            echo "CONEXION_EXITOSA"
            cd ~/galantesjewelry_staging || exit 1
            git fetch origin develop
            git reset --hard origin/develop
            sudo docker compose -p galantes-staging --env-file .env.prod -f docker-compose.staging.yml up -d --build
          REMOTESSH
