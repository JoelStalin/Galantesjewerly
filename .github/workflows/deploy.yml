name: Deploy to GCP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: SSH and Deploy to GCP
        uses: appleboy/ssh-action@master
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          CF_TUNNEL_TOKEN_PROD: ${{ secrets.CF_TUNNEL_TOKEN_PROD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: yoeli
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: ADMIN_PASSWORD,ADMIN_SECRET_KEY,POSTGRES_PASSWORD,ODOO_PASSWORD,ODOO_API_KEY,CF_TUNNEL_TOKEN_PROD,STRIPE_SECRET_KEY
          script: |
            set -Eeuo pipefail

            # Ir al directorio raíz
            cd ~/galantesjewelry || exit 1

            BACKUP_TIMESTAMP="$(date +%Y%m%d_%H%M%S)"
            BACKUP_DIR="backups/predeploy/${BACKUP_TIMESTAMP}"
            ROLLBACK_REQUIRED=0

            rollback() {
              if [ "${ROLLBACK_REQUIRED}" -ne 1 ]; then
                return 0
              fi

              echo "CRITICAL: Failure detected. Restoring from ${BACKUP_DIR}..."
              # Restore .env.prod
              [ -f "${BACKUP_DIR}/.env.prod" ] && cp -f "${BACKUP_DIR}/.env.prod" .env.prod
              # Restore Database if dump exists
              if [ -f "${BACKUP_DIR}/galantes_db.sql" ]; then
                 sudo docker exec galantes_db sh -lc "PGPASSWORD=\"${POSTGRES_PASSWORD}\" psql -U odoo -d galantes_db < /tmp/galantes_db.sql" || echo "DB Restore failed"
              fi
              # Up services
              sudo docker compose -f docker-compose.production.yml up -d
              echo "Rollback completed."
            }

            wait_http() {
              url="$1"
              label="$2"
              retries="${3:-24}"
              delay="${4:-5}"
              for attempt in $(seq 1 "$retries"); do
                if curl -fsS --max-time 10 "$url" >/dev/null 2>&1; then
                  echo "Health OK: $label"
                  return 0
                fi
                echo "Waiting for $label ($attempt/$retries)..."
                sleep "$delay"
              done
              echo "Health FAIL: $label" >&2
              return 1
            }

            trap 'status=$?; if [ $status -ne 0 ]; then rollback; fi; exit $status' EXIT

            # 1. Mandatory Backup
            echo "Creating safety backup..."
            mkdir -p "${BACKUP_DIR}"
            [ -f .env.prod ] && cp -f .env.prod "${BACKUP_DIR}/.env.prod"
            cp -f docker-compose.production.yml "${BACKUP_DIR}/"
            
            echo "Dumping Odoo database..."
            # No ignoramos errores aquí: si falla el dump, falla el deploy.
            sudo docker exec galantes_db sh -lc "PGPASSWORD=\"${POSTGRES_PASSWORD}\" pg_dump -U odoo -d galantes_db --no-owner --no-privileges --clean --if-exists" > "${BACKUP_DIR}/galantes_db.sql"
            
            tar -czf "${BACKUP_DIR}/app-data-snapshot.tgz" data odoo infra/nginx
            echo "Backup successful: ${BACKUP_DIR}"
            
            ROLLBACK_REQUIRED=1

            # 2. Sync Code
            echo "Syncing latest code from GitHub..."
            # Save server-specific files
            [ -f .env.prod ] && cp -f .env.prod /tmp/galantes_env_keep
            
            git fetch origin main
            CHANGES=$(git diff --name-only HEAD origin/main)
            git reset --hard origin/main
            
            # Restore server-specific files
            [ -f /tmp/galantes_env_keep ] && cp -f /tmp/galantes_env_keep .env.prod && rm -f /tmp/galantes_env_keep

            # 3. Dynamic Data Sync (Apply production masters to live data)
            echo "Applying production data masters..."
            if [ -f cms_prod_local.json ]; then
              cp -f cms_prod_local.json data/cms.json
            fi
            if [ -f integrations_prod.json ]; then
              cp -f integrations_prod.json data/integrations.json
            fi

            # 4. Update environment variables
            touch .env.prod
            update_env() {
              key="$1"
              value="$2"
              [ -z "$value" ] && return 0
              if grep -q "^${key}=" .env.prod; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.prod
              else
                echo "${key}=${value}" >> .env.prod
              fi
            }
            update_env "ADMIN_PASSWORD" "${ADMIN_PASSWORD}"
            update_env "ADMIN_SECRET_KEY" "${ADMIN_SECRET_KEY}"
            update_env "POSTGRES_PASSWORD" "${POSTGRES_PASSWORD}"
            update_env "ODOO_PASSWORD" "${ODOO_PASSWORD}"
            update_env "ODOO_API_KEY" "${ODOO_API_KEY}"
            update_env "STRIPE_SECRET_KEY" "${STRIPE_SECRET_KEY}"
            chmod 600 .env.prod

            # 5. Build and Deploy
            if echo "$CHANGES" | grep -qE "(app/|components/|lib/|src/|package.json|Dockerfile|docker-compose|next.config)"; then
              echo "Changes detected in application. Rebuilding..."
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml build web
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml up -d --no-deps web
            fi

            if echo "$CHANGES" | grep -qE "(odoo/|docker-compose)"; then
              echo "Changes detected in Odoo. Updating modules..."
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml exec -T odoo odoo -c /etc/odoo/odoo.conf -d galantes_db -u galantes_jewelry --stop-after-init
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml restart odoo
            fi

            # Clean up old images
            sudo docker image prune -f

            # 6. Final Health Verification
            echo "Verifying service availability..."
            wait_http "http://127.0.0.1:3000/api/health" "web internal"
            wait_http "https://galantesjewelry.com/api/health" "public site"
            wait_http "https://odoo.galantesjewelry.com/healthz" "odoo backend"

            ROLLBACK_REQUIRED=0
            echo "AUTOMATED DEPLOYMENT SUCCESSFUL."
