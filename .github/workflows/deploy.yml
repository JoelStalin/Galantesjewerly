name: Deploy to GCP Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: SSH and Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: yoeli
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            # Ir al directorio raíz
            cd ~

            # Verificar si el directorio existe y si es un repositorio Git válido
            if [ -d "galantesjewelry" ] && [ ! -d "galantesjewelry/.git" ]; then
              echo "Directorio existe pero no es un repo Git. Eliminando para clonación limpia..."
              sudo rm -rf galantesjewelry
            fi

            # Si no existe el directorio, clonar el repositorio
            if [ ! -d "galantesjewelry" ]; then
              echo "Clonando repositorio..."
              git clone https://github.com/JoelStalin/Galantesjewerly.git galantesjewelry
            fi

            # Entrar al repositorio y sincronizar
            cd ~/galantesjewelry
            echo "Sincronizando con main..."
            git fetch origin
            git reset --hard origin/main

            # Sincronizar secretos (Crear .env.prod si no existe)
            touch .env.prod
            sed -i "s/^ADMIN_PASSWORD=.*/ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}/" .env.prod || echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env.prod
            sed -i "s/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}/" .env.prod || echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
            sed -i "s/^ODOO_PASSWORD=.*/ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}/" .env.prod || echo "ODOO_PASSWORD=${{ secrets.ODOO_PASSWORD }}" >> .env.prod
            sed -i "s/^ODOO_API_KEY=.*/ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}/" .env.prod || echo "ODOO_API_KEY=${{ secrets.ODOO_API_KEY }}" >> .env.prod
            sed -i "s/^CF_TUNNEL_TOKEN_PROD=.*/CF_TUNNEL_TOKEN_PROD=${{ secrets.CF_TUNNEL_TOKEN_PROD }}/" .env.prod || echo "CF_TUNNEL_TOKEN_PROD=${{ secrets.CF_TUNNEL_TOKEN_PROD }}" >> .env.prod

            # Desplegar con Docker
            echo "Levantando contenedores..."
            sudo docker compose --env-file .env.prod -f docker-compose.production.yml up -d --build --force-recreate

            # Limpieza y Verificación
            sudo docker image prune -f
            sleep 15
            sudo docker ps
