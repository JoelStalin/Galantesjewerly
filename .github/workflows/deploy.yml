name: Deploy to GCP Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: yoeli
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            # Ir al directorio raíz
            cd ~/galantesjewelry || exit 1

            # Backup predeploy obligatorio
            TS=$(date +%Y%m%d_%H%M%S)
            BK="backups/predeploy/${TS}"
            mkdir -p "$BK"
            echo "Creando backup en $BK..."
            [ -f .env.prod ] && cp -f .env.prod "$BK/.env.prod" || true
            cp -f docker-compose.production.yml "$BK/" || true
            
            # Backup DB
            sudo docker exec galantes_db sh -lc "PGPASSWORD=\"${{ secrets.POSTGRES_PASSWORD }}\" pg_dump -U odoo -d galantes_db --no-owner --no-privileges --clean --if-exists" > "$BK/galantes_db.sql" 2>/dev/null || echo "Warn: DB backup failed"
            
            tar -czf "$BK/app-data-pre-reset.tgz" data odoo infra/nginx 2>/dev/null || true

            # Sincronizar código
            echo "Sincronizando con Git..."
            [ -f .env.prod ] && cp -f .env.prod /tmp/galantes_env_keep
            git fetch origin main
            CHANGES=$(git diff --name-only HEAD origin/main)
            git reset --hard origin/main
            [ -f /tmp/galantes_env_keep ] && cp -f /tmp/galantes_env_keep .env.prod && rm -f /tmp/galantes_env_keep

            # Maestros de datos
            [ -f cms_prod_local.json ] && cp -f cms_prod_local.json data/cms.json
            [ -f integrations_prod.json ] && cp -f integrations_prod.json data/integrations.json

            # Actualizar secretos (Directamente desde Action context)
            touch .env.prod
            update_env() {
              key="$1"; value="$2"
              [ -z "$value" ] && return 0
              if grep -q "^${key}=" .env.prod; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.prod
              else
                echo "${key}=${value}" >> .env.prod
              fi
            }

            update_env "ADMIN_PASSWORD" "${{ secrets.ADMIN_PASSWORD }}"
            update_env "ADMIN_SECRET_KEY" "${{ secrets.ADMIN_SECRET_KEY }}"
            update_env "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}"
            update_env "ODOO_PASSWORD" "${{ secrets.ODOO_PASSWORD }}"
            update_env "ODOO_API_KEY" "${{ secrets.ODOO_API_KEY }}"
            update_env "STRIPE_SECRET_KEY" "${{ secrets.STRIPE_SECRET_KEY }}"
            update_env "CF_TUNNEL_TOKEN_PROD" "${{ secrets.CF_TUNNEL_TOKEN_PROD }}"
            chmod 600 .env.prod

            # Desplegar
            if echo "$CHANGES" | grep -qE "(app/|components/|lib/|src/|package.json|Dockerfile|docker-compose|next.config)"; then
              echo "Reconstruyendo contenedor web..."
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml build web
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml up -d --no-deps web
            fi

            if echo "$CHANGES" | grep -qE "(odoo/|docker-compose)"; then
              echo "Actualizando módulos de Odoo..."
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml exec -T odoo odoo -c /etc/odoo/odoo.conf -d galantes_db -u galantes_jewelry --stop-after-init || true
              sudo docker compose --env-file .env.prod -f docker-compose.production.yml restart odoo
            fi

            sudo docker image prune -f
            echo "DEPLOYMENT SUCCESSFUL."
