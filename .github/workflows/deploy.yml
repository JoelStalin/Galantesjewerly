name: Deploy to GCP Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: SSH and Deploy to GCP
        uses: appleboy/ssh-action@master
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          CF_TUNNEL_TOKEN_PROD: ${{ secrets.CF_TUNNEL_TOKEN_PROD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: yoeli
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: ADMIN_PASSWORD,ADMIN_SECRET_KEY,POSTGRES_PASSWORD,ODOO_PASSWORD,ODOO_API_KEY,CF_TUNNEL_TOKEN_PROD,STRIPE_SECRET_KEY
          script: |
            # Ir al directorio raíz
            cd ~

            # Verificar si el directorio existe y si es un repositorio Git válido
            if [ -d "galantesjewelry" ] && [ ! -d "galantesjewelry/.git" ]; then
              echo "Directorio existe pero no es un repo Git. Eliminando para clonación limpia..."
              sudo rm -rf galantesjewelry
            fi

            # Si no existe el directorio, clonar el repositorio
            if [ ! -d "galantesjewelry" ]; then
              echo "Clonando repositorio..."
              git clone https://github.com/JoelStalin/Galantesjewerly.git galantesjewelry
            fi

            # Entrar al repositorio y sincronizar
            cd ~/galantesjewelry
            echo "Sincronizando con main..."
            git fetch origin
            git reset --hard origin/main

            # Sincronizar secretos desde GitHub Actions → .env.prod
            # Usar archivo temporal para escritura atómica
            {
              echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
              echo "ADMIN_SECRET_KEY=$ADMIN_SECRET_KEY"
              echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
              echo "POSTGRES_USER=odoo"
              echo "ODOO_DB=galantes_db"
              echo "ODOO_PASSWORD=$ODOO_PASSWORD"
              echo "ODOO_API_KEY=$ODOO_API_KEY"
              echo "CF_TUNNEL_TOKEN_PROD=$CF_TUNNEL_TOKEN_PROD"
              echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
            } > /tmp/.env.prod.new
            mv /tmp/.env.prod.new ~/galantesjewelry/.env.prod

            # Rebuild solo el contenedor web (Odoo/Postgres no cambian)
            echo "Rebuilding web container..."
            sudo docker compose --env-file .env.prod -f docker-compose.production.yml build web
            sudo docker compose --env-file .env.prod -f docker-compose.production.yml up -d --no-deps web

            # Limpieza y Verificación
            sudo docker image prune -f
            sleep 20
            sudo docker ps
            echo "Health check..."
            curl -sf http://localhost:8080/api/health && echo "OK" || echo "WARN: health check failed"
