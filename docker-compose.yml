services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-galantes2026}
    volumes:
      # Carpeta de datos persistente para que las fotos no se borren en reinicios
      - ./data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - galante-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_tunnel
    restart: always
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - galante-net

networks:
  galante-net:
    driver: bridge
