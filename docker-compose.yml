services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: galantes_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html/public:ro
    expose:
      - "80"
    depends_on:
      - web
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
