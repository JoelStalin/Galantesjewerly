# Docker Compose — Galante's Jewelry (Production-Ready)
# Services: Next.js Web + Nginx Proxy + Odoo Backend + PostgreSQL
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d --build
#
# Note: This is the full stack. For development, you may want to:
#   - Run Next.js locally: npm run dev
#   - Run Odoo: docker-compose -f odoo/docker-compose.yml up
#   - Run Nginx locally or use the production compose

services:
  # ========== NEXT.JS WEB APPLICATION ==========
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_web
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - APP_DATA_DIR=/app/data
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:?set ADMIN_SECRET_KEY}
      # Odoo integration
      - ODOO_ENABLED=${ODOO_ENABLED:-true}
      - ODOO_BASE_URL=http://odoo:8069
      - ODOO_DB=${ODOO_DB:-galantes_db}
      - ODOO_API_KEY=${ODOO_API_KEY:?set ODOO_API_KEY}
      - ODOO_SYNC_ON_APPOINTMENT_VALIDATED=${ODOO_SYNC_ON_APPOINTMENT_VALIDATED:-true}
      # Meta integration
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_CATALOG_ID=${META_CATALOG_ID}
      - META_SYNC_TOKEN=${META_SYNC_TOKEN:?set META_SYNC_TOKEN}
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - galante-net
    depends_on:
      - odoo

  # ========== ODOO 17 ERP BACKEND ==========
  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    container_name: galantes_odoo
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - HOST=postgres
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=${ODOO_DB:-galantes_db}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - ODOO_DB=${ODOO_DB:-galantes_db}
      - ODOO_USERNAME=${ODOO_USERNAME:-admin}
      - ODOO_PASSWORD=${ODOO_PASSWORD:?set ODOO_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      - ODOO_AUTO_INSTALL_MODULES=${ODOO_AUTO_INSTALL_MODULES:-false}
      - PGDATA=/var/lib/postgresql/data
    expose:
      - "8069"
      - "8072"
    volumes:
      - odoo-data:/var/lib/odoo
      - ../cell_odoo/addons/enterprise:/mnt/enterprise-addons:ro
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo/logs:/var/log/odoo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - galante-net
    depends_on:
      postgres:
        condition: service_healthy

  # ========== POSTGRESQL DATABASE ==========
  postgres:
    image: postgres:15-alpine
    container_name: galantes_db
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_DB=${ODOO_DB:-galantes_db}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - galante-net
    expose:
      - "5432"

  # ========== NGINX REVERSE PROXY ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: galantes_nginx
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${NGINX_PORT:-8080}:80"
      # Uncomment for HTTPS (requires SSL certificates):
      # - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Uncomment for SSL:
      # - ./infra/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./infra/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - galante-net
    depends_on:
      web:
        condition: service_healthy
      odoo:
        condition: service_healthy

  # ========== CLOUDFLARE TUNNEL (PRODUCCIÓN) ==========
  # Conecta Docker Local (PRODUCCIÓN) a Cloudflare Zero Trust
  # El token CF_TUNNEL_TOKEN_PROD se establece en .env.prod
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_tunnel_prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_PROD:?set CF_TUNNEL_TOKEN_PROD in .env.prod}
    environment:
      - LOG_LEVEL=info
    networks:
      - galante-net
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8768/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3

# ========== NETWORKS ==========
networks:
  galante-net:
    driver: bridge

# ========== VOLUMES ==========
volumes:
  odoo-data:
    driver: local
  postgres-data:
    driver: local
