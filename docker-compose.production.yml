# Docker Compose — Galante's Jewelry (Production-Ready)
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_web_v4
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=REDACTED_ROTATE_IMMEDIATELY
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - ODOO_BASE_URL=http://odoo:8069
      - ODOO_DB=${ODOO_DB:-galantes_db}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    networks:
      - galante-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    container_name: galantes_odoo
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
    environment:
      - HOST=postgres
      - USER=odoo
      - PASSWORD=REDACTED_ROTATE_IMMEDIATELY
      - ODOO_PASSWORD=REDACTED_ROTATE_IMMEDIATELY
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ODOO_DB=${ODOO_DB:-galantes_db}
    networks:
      - galante-net
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: galantes_db
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - POSTGRES_DB=${ODOO_DB:-galantes_db}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - galante-net

  nginx:
    image: nginx:1.27-alpine
    container_name: galantes_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - galante-net
    depends_on:
      web:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_tunnel_prod
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_PROD}
    networks:
      - galante-net
    # Eliminada la dependencia estricta de healthcheck para evitar caídas de red si la app tarda en iniciar

networks:
  galante-net:
    driver: bridge

volumes:
  odoo-data:
  postgres-data:
